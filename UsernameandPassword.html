<div class="login-card">
    <h2>Login</h2>

    <!-- Username Field -->
    <div class="input-box">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>

    <!-- Password Field with Show Button Inside -->
    <div class="input-box">
        <label>Password</label>

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter password">
            <button type="button" class="toggle-btn" onclick="togglePassword()">Show</button>
        </div>
    </div>

    <!-- Buttons -->
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>

    <p id="message"></p>
</div>


<style>
    body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #eadbb1;
    }

    .login-card {
        width: 300px;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 20px #d4af37;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .input-box {
        margin-bottom: 15px;
    }

    label {
        font-size: 12px;
        color: #d4af37;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        font-size: 13px;
    }

    /* Password with button inside */
    .password-box {
        position: relative;
    }

    .password-box input {
        padding-right: 60px;
    }

    .toggle-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 12px;
        color: #d4af37;
        cursor: pointer;
    }

    .toggle-btn:hover {
        text-decoration: underline;
    }

    .login-btn, .register-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        margin-top: 10px;
        cursor: pointer;
        font-size: 13px;
    }

    .login-btn {
        background: #d4af37;
        color: white;
    }

    .register-btn {
        background: transparent;
        border: 1px solid #d4af37;
    }

    #message {
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
    }
</style>


<script>
function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    console.log("Username:", user);
    console.log("Password:", pass);
    
function register() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    console.log("Register clicked");
    console.log("Username:", user);
    console.log("Password:", pass);

    const message = document.getElementById("message");
    message.textContent = "Redirecting to registration...";
    message.style.color = "#333";
}

    if (!user || !pass) {
        message.textContent = "Please fill in all fields.";
        message.style.color = "red";
    } else if (user === "admin" && pass === "1234") {
        message.textContent = "Login successful!";
        message.style.color = "green";
    } else {
        message.textContent = "Invalid username or password.";
        message.style.color = "red";
    }
}

function togglePassword() {
    const pass = document.getElementById("password");
    const btn = document.querySelector(".toggle-btn");

    if (pass.type === "password") {
        pass.type = "text";
        btn.textContent = "Hide";
    } else {
        pass.type = "password";
        btn.textContent = "Show";
    }
}

function register() {
    const message = document.getElementById("message");
    message.textContent = "Redirecting to registration...";
    message.style.color = "#333";
}
</script>
